normal = { family = "MesloLGMDZ Nerd Font", style = "Medium" }
bold = { family = "MesloLGMDZ Nerd Font", style = "Bold" }
italic = { family = "MesloLGMDZ Nerd Font", style = "Italic" }
bold_italic = { family = "MesloLGMDZ Nerd Font", style = "Bold Italic" }
size = 13

[font.offset]
x = 0
y = 0

[window]
decorations = "None"
# dynamic_padding = true
# resize_increments = true
padding = { x = 0, y = 0 }
