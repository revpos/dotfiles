[env]
TERM = "xterm-256color"
LANG = "en_US.UTF-8"
LC_ALL = "en_US.UTF-8"

[terminal.shell]
program = "/bin/bash"
# args = ["--login"]

[general]
import = [
	"~/.config/alacritty/themes/tokyo_night.toml"
]
# working_directory = "/home/rev/revpos/"

[font]

# normal = { family = "SauceCodePro Nerd Font", style = "Medium" }
# bold = { family = "SauceCodePro Nerd Font", style = "Bold" }
# italic = { family = "SauceCodePro Nerd Font", style = "Italic" }
# bold_italic = { family = "SauceCodePro Nerd Font", style = "Bold Italic" }

# normal = { family = "Hack", style = "Regular" }
